services:

  postgres:
    image: postgres:17
    container_name: taskflow-db

    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: taskflowuser
      POSTGRES_PASSWORD: taskflowpassword

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflowuser -d taskflow"]
      interval: 10s
      timeout: 5s
      retries: 5


  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: taskflow-app

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/taskflow
      SPRING_DATASOURCE_USERNAME: taskflowuser
      SPRING_DATASOURCE_PASSWORD: taskflowpassword

    depends_on:
      postgres:
        condition: service_healthy


volumes:
  postgres-data: