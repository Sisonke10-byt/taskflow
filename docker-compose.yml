services:
  postgres:
    image: postgres:17
    container_name: taskflow-db

    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: taskflowuser
      POSTGRES_PASSWORD: taskflowpassword

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: